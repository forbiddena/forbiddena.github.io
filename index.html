        <h2 id="常用基础命令"><a href="#常用基础命令" class="headerlink" title="常用基础命令"></a>常用基础命令</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">--查看数据库版本</span><br><span class="line">select version();</span><br><span class="line">select pg_read_file(&#x27;PG_VERSION&#x27;, 0, 200);</span><br><span class="line">SELECT current_setting(&#x27;server_version_num&#x27;);</span><br><span class="line"></span><br><span class="line">--列目录</span><br><span class="line">select pg_ls_dir(&#x27;/etc&#x27;);</span><br><span class="line"></span><br><span class="line">--获取 pgsql 安装目录</span><br><span class="line">select setting from pg_settings where name = &#x27;data_directory&#x27;;</span><br><span class="line"></span><br><span class="line">--查找 pgsql 配置文件路径</span><br><span class="line">select setting from pg_settings where name=&#x27;config_file&#x27;;</span><br><span class="line"></span><br><span class="line">列出数据库</span><br><span class="line">SELECT datname FROM pg_database;</span><br><span class="line"></span><br><span class="line">--查看支持的语言</span><br><span class="line">select * from pg_language;</span><br><span class="line"></span><br><span class="line">--查看安装的扩展</span><br><span class="line">select * from pg_available_extensions;</span><br><span class="line"></span><br><span class="line">--查看服务器ip地址</span><br><span class="line">select inet_server_addr();</span><br><span class="line"></span><br></pre></td></tr></table></figure>
